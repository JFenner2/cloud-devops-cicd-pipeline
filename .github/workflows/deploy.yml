name: Build, Publish and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  SSM_DOCUMENT_NAME: ${{ vars.SSM_DOCUMENT_NAME }}

jobs:
  build-test-publish-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t cicd-project4:${{ github.sha }} ./app

      - name: Run Docker container
        run: |
          docker run -d \
            --name cicd-project4-test \
            -p 8080:80 \
            cicd-project4:${{ github.sha }}

      - name: Wait for application
        run: sleep 5

      - name: Test application
        run: |
          curl --fail http://localhost:8080
          curl --fail http://localhost:8080 |
            grep "Cloud DevOps CI/CD Pipeline"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker tag \
            cicd-project4:${IMAGE_TAG} \
            "${IMAGE_URI}"

          docker push "${IMAGE_URI}"

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Send deployment command
        id: send-deployment
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "${SSM_DOCUMENT_NAME}" \
            --parameters "{\"imageUri\":[\"${IMAGE_URI}\"]}" \
            --comment "Deploy Git commit ${GITHUB_SHA}" \
            --query "Command.CommandId" \
            --output text)

          echo "Deployment command ID: ${COMMAND_ID}"
          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"

      - name: Wait for deployment result
        run: |
          STATUS="Pending"

          for attempt in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Deployment status: ${STATUS}"

            case "${STATUS}" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query '{
              Status: Status,
              Output: StandardOutputContent,
              Errors: StandardErrorContent
            }' \
            --output json

          if [ "${STATUS}" != "Success" ]; then
            echo "Deployment did not succeed."
            exit 1
          fi

      - name: Clean up test container
        if: always()
        run: |
          docker stop cicd-project4-test || true
          docker rm cicd-project4-test || true
